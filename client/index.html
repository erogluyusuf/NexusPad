<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPad Ultimate Console</title>
    <style>
        body { 
            margin: 0; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0A0A0C; color: white; 
        }
        
        /* Lobi ve PIN Ekranı */
        #lobby { 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            height: 100vh; text-align: center; 
            background: radial-gradient(circle at center, #1a1a2e 0%, #0A0A0C 100%);
        }
        #pin-code { 
            font-size: 6rem; font-weight: 900; letter-spacing: 15px; 
            color: #00ffff; text-shadow: 0 0 20px rgba(0,255,255,0.5); 
            margin: 20px 0; 
        }

        /* 4'lü Oyun Kartları (Grid) */
        .game-grid {
            display: flex; gap: 30px; justify-content: center; margin-top: 40px;
        }
        .game-card {
            background: #16161e; width: 220px; height: 300px;
            border-radius: 20px; padding: 20px;
            border: 2px solid #333; transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        /* Telefondan Seçilmeyi Bekleyen Oyunların Şık Tasarımı */
        .game-card.racing { border-color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.2); }
        .game-card.flight { border-color: #3399ff; box-shadow: 0 0 15px rgba(51,153,255,0.2); }
        .game-card.fps { border-color: #ff3366; box-shadow: 0 0 15px rgba(255,51,102,0.2); }
        .game-card.fight { border-color: #ffcc00; box-shadow: 0 0 15px rgba(255,204,0,0.2); }

        .game-card h2 { margin-bottom: 5px; font-size: 24px; }
        .game-card p { color: #888; font-size: 14px; }

        /* Oyun Alanı (Başlangıçta gizli) */
        #game { display: none; width: 100vw; height: 100vh; position: relative; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 style="color: #fff; letter-spacing: 5px;">NEXUSPAD SİSTEMİ BAŞLATILIYOR</h1>
        <h2 id="pin-code">YÜKLENİYOR...</h2>
        <p style="color: #aaa; font-size: 1.2rem;">Telefonunuzdan bu PIN kodunu girerek bağlanın.</p>
    </div>

    <div id="game"></div>

    <script type="module" src="/main.js"></script>
</body>
</html>
